name: Code Quality Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # ==================== 1. 后端 PHP 环境配置 ====================
    - name: Setup PHP
      uses: actions/setup-php@v2
      with:
        php-version: '8.4' # 与您本地 Laravel Herd 严格一致
        extensions: mbstring, dom, fileinfo, gd, zip
        coverage: none

    - name: Install PHP Dependencies
      run: composer install --no-interaction --prefer-dist --optimize-autoloader --ignore-platform-reqs

    - name: Check PHP Syntax
      run: find app -type f -name "*.php" -exec php -l {} \;


    # ==================== 2. 前端 Node & Inertia 环境配置 ====================
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # 使用当前主流且稳定的 Node 20 LTS 版本
        cache: 'npm'       # 开启 npm 缓存加速后续构建速度

    - name: Install Node Dependencies
      run: npm ci          # 相比 npm install，npm ci 专门用于 CI 环境，严格基于 package-lock.json 安装

    - name: Compile Frontend Assets (Vite)
      # 验证 Vite 编译以及 Vue 3 + TypeScript 代码有没有硬性语法报错
      run: npm run build
