name: Code Quality Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # ==================== 1. 后端 PHP 环境配置 ====================
    - name: Setup PHP
      # 关键修正：从 actions/setup-php 变更为社区标准的 shivammathur/setup-php
      uses: shivammathur/setup-php@v2 
      with:
        php-version: '8.4' # 严格锁定与本地一致的 8.4 版本
        extensions: mbstring, dom, fileinfo, gd, zip
        coverage: none

    - name: Install PHP Dependencies
      run: composer install --no-interaction --prefer-dist --optimize-autoloader --ignore-platform-reqs

    - name: Check PHP Syntax
      run: find app -type f -name "*.php" -exec php -l {} \;


    # ==================== 2. 前端 Node & Inertia 环境配置 ====================
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' 
        cache: 'npm'       

    - name: Install Node Dependencies
      run: npm ci          

    - name: Compile Frontend Assets (Vite)
      run: npm run build
